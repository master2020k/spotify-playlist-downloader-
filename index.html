<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Playlist Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
:root{
  --bg:#121212;
  --surface:#1e1e1e;
  --surface2:#242424;
  --surfaceActive:#221a3d;
  --text:#fff;
  --sub:#b3b3b3;
  --accent:#7C4DFF;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Varela Round',system-ui;background:var(--bg);color:var(--text);}
.container{max-width:900px;margin:auto;padding:20px 20px 180px;}
.header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.header-title{font-size:26px;font-weight:700}
.header-sub{font-size:13px;color:var(--sub)}
.quality-selector{display:flex;gap:8px;background:var(--surface);padding:6px;border-radius:50px;}
.quality-btn{background:transparent;color:var(--sub);border:none;border-radius:50px;padding:8px 16px;cursor:pointer;}
.quality-btn.active{background:var(--accent);color:#000;}
.list{margin-top:16px;display:flex;flex-direction:column;gap:1px;}
.card{background:var(--surface);padding:12px;display:flex;gap:12px;align-items:center;cursor:pointer;}
.card img{width:48px;height:48px;border-radius:50%;}
.card-info{flex:1}
.title{font-size:14px;font-weight:600}
.meta{font-size:12px;color:var(--sub)}
.play-wrap{width:42px;height:42px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.play-wrap .material-icons{color:var(--accent);}
.fab,.download-all{position:fixed;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;}
.fab{bottom:24px}
.download-all{bottom:92px;display:none}
.sheet{position:fixed;left:0;right:0;bottom:-100%;background:var(--surface);padding:20px;border-radius:20px 20px 0 0;}
.sheet.open{bottom:0}
.sheet input,.sheet button{width:100%;padding:12px;margin-bottom:12px;}
.progress-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;}
.progress-modal.show{display:flex}
.progress-content{background:var(--surface);padding:30px;border-radius:20px;min-width:320px;text-align:center}
.progress-bar-container{background:var(--surface2);height:8px;border-radius:10px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);width:0%}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div>
      <div class="header-title">Playlist</div>
      <div class="header-sub" id="trackCount">No playlist loaded</div>
    </div>

    <div class="quality-selector">
      <button class="quality-btn" data-quality="96kbps">96</button>
      <button class="quality-btn active" data-quality="160kbps">160</button>
      <button class="quality-btn" data-quality="320kbps">320</button>
    </div>
  </div>

  <div class="list" id="tracks"></div>
</div>

<button class="download-all" id="downloadAll">
  <span class="material-icons">download</span>
</button>

<button class="fab" id="fab">+</button>

<div class="sheet" id="sheet">
  <input id="playlistUrl" placeholder="Paste Spotify playlist URL">
  <button id="loadBtn">Load</button>
</div>

<div class="progress-modal" id="progressModal">
  <div class="progress-content">
    <div id="progressTitle">Downloading...</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="progressText">0 / 0</div>
  </div>
</div>

<audio id="player"></audio>

<script>
const CLIENT_ID = "YOUR_CLIENT_ID";
const CLIENT_SECRET = "YOUR_CLIENT_SECRET";

const SAAVN_API = "https://jiosavan-api-with-playlist.vercel.app/api/search/songs";

const tracksDiv = document.getElementById("tracks");
const trackCount = document.getElementById("trackCount");
const player = document.getElementById("player");
const downloadBtn = document.getElementById("downloadAll");
const progressModal = document.getElementById("progressModal");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const progressTitle = document.getElementById("progressTitle");

let accessToken = "";
let currentSongKey = null;
let currentCard = null;
let selectedQuality = "160kbps";
const saavnCache = {};

// ---------- UI ----------
document.querySelectorAll('.quality-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.quality-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality=btn.dataset.quality;
  };
});

fab.onclick=()=>sheet.classList.add("open");

// ---------- SPOTIFY TOKEN ----------
async function getSpotifyToken(){
  const res = await fetch("https://accounts.spotify.com/api/token",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded",
      "Authorization":"Basic "+btoa(CLIENT_ID+":"+CLIENT_SECRET)
    },
    body:"grant_type=client_credentials"
  });
  const data=await res.json();
  accessToken=data.access_token;
}

// ---------- PLAYLIST ID ----------
function getPlaylistId(url){
  try{return new URL(url).pathname.split("/playlist/")[1].split("?")[0];}
  catch{return null;}
}

// ---------- SAAVN ----------
async function prefetchSaavn(key){
  const res=await fetch(`${SAAVN_API}?query=${encodeURIComponent(key)}&limit=1`);
  const json=await res.json();
  const r=json?.data?.results?.[0];

  saavnCache[key]=r?.downloadUrl?.map(d=>({
    quality:d.quality,
    url:d.link||d.url
  }))||[];
}

// ---------- LOAD ----------
loadBtn.onclick=async()=>{
  const id=getPlaylistId(playlistUrl.value);
  if(!id)return;

  sheet.classList.remove("open");
  tracksDiv.innerHTML="";
  downloadBtn.style.display="none";
  trackCount.textContent="Loading...";

  if(!accessToken) await getSpotifyToken();

  const res=await fetch(`https://api.spotify.com/v1/playlists/${id}`,{
    headers:{Authorization:"Bearer "+accessToken}
  });

  const data=await res.json();
  const tracks=data.tracks.items.map(i=>i.track).filter(Boolean);

  trackCount.textContent=`${tracks.length} tracks`;

  await Promise.all(tracks.map(t=>
    prefetchSaavn(`${t.name} ${t.artists.map(a=>a.name).join(" ")}`)
  ));

  downloadBtn.style.display="flex";

  tracks.forEach((t,i)=>{
    const key=`${t.name} ${t.artists.map(a=>a.name).join(" ")}`;

    const card=document.createElement("div");
    card.className="card";
    card.dataset.key=key;

    card.innerHTML=`
      <img src="${t.album.images[0]?.url}">
      <div class="card-info">
        <div class="title">${t.name}</div>
        <div class="meta">${t.artists.map(a=>a.name).join(", ")}</div>
      </div>
      <div class="play-wrap"><span class="material-icons">play_arrow</span></div>
    `;

    const btn=card.querySelector(".play-wrap");
    const icon=btn.querySelector(".material-icons");

    btn.onclick=()=>{
      const urls=saavnCache[key];
      const url=urls.find(u=>u.quality===selectedQuality)?.url||urls.at(-1)?.url;
      if(!url)return;

      player.src=url;
      player.play();

      icon.textContent="pause";
      currentCard=card;
      currentSongKey=key;
    };

    tracksDiv.appendChild(card);
  });
};

// ---------- DOWNLOAD ----------
downloadBtn.onclick=async()=>{
  const songs=Object.entries(saavnCache);
  let done=0;

  progressModal.classList.add("show");

  for(const [song,urls] of songs){
    const url=urls.find(u=>u.quality===selectedQuality)?.url||urls.at(-1)?.url;
    if(!url)continue;

    const res=await fetch(url);
    const blob=await res.blob();

    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=song+".mp3";
    a.click();

    done++;
    progressBar.style.width=(done/songs.length)*100+"%";
    progressText.textContent=`${done}/${songs.length}`;
  }

  progressTitle.textContent="Done";
};
</script>

</body>
</html>
